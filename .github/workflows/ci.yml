name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/dist/**

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          # Use the repo-root lychee.toml so sibling-repo links
          # (../bifrost-program/ADRs/*) are excluded on CI — that
          # directory is not checked out on the runner.
          args: --config lychee.toml './**/*.md'
          fail: true
